# Annotation unit stopping rules
min_size: 50
purity_factor: 5.0    # max_purity = purity_factor / K  (K = numero de topicos del dominio)

priority_weights:
  topic_mixture: 0.5
  size: 0.3
  merge_balance: 0.2

# UI display controls
ui_display:
  topic_words_max: 15
  theme_bars_max: 5
  theme_bar_min_weight: 0.1
  group_preview_queries: 3
  representative_queries_max: 40
  topic_top_docs_generated: 20
  theme_typical_queries_max: 20
  views:
    themes: true
    groups: false
    guidelines: false